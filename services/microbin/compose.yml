services:
  microbin:
    container_name: microbin
    image: danielszabo99/microbin@sha256:6660e5ccad0d764fa3c0032464ffb8f4b4f28c92a2eb9e39202b94cdc5b68909
    restart: always
    volumes:
      - microbin:/app
    networks:
      - microbin
    environment:
      MICROBIN_ADMIN_PASSWORD: ${MICROBIN_ADMIN_PASSWORD}
      MICROBIN_ADMIN_USERNAME: ${MICROBIN_ADMIN_USERNAME}
      MICROBIN_DEFAULT_EXPIRY: never
      MICROBIN_EDITABLE: true
      MICROBIN_ENABLE_BURN_AFTER: true
      MICROBIN_ETERNAL_PASTA: true
      MICROBIN_GC_DAYS: 365 # Auto delete after 1 year of no access
      MICROBIN_HASH_IDS: true
      MICROBIN_HIDE_FOOTER: true
      MICROBIN_MAX_EXPIRY: never # https://github.com/szabodanika/microbin/issues/331
      MICROBIN_NO_LISTING: true
      MICROBIN_PUBLIC_PATH: https://microbin.nicholaslyz.com
      MICROBIN_QR: true

    labels:
      traefik.enable: true
      traefik.docker.network: core_microbin
      homepage.group: Services
      homepage.name: Microbin
      homepage.icon: microbin
      homepage.href: &url https://microbin.nicholaslyz.com
      homepage.siteMonitor: *url

volumes:
  microbin:

networks:
  microbin:
