services:
  microbin:
    container_name: microbin
    image: danielszabo99/microbin@sha256:e610803b569d5a0201d696a15649b46e9f6f91b1c46abf6dee231647841f519f
    restart: always
    volumes:
      - microbin:/app
    command:
      [
        "--editable",
        "--enable-burn-after",
        "--qr",
        "--private",
        "--default-expiry",
        "1week",
        "--hide-footer",
        "--public-path",
        "https://microbin.nicholaslyz.com",
      ]
    networks:
      - microbin
    environment:
      MICROBIN_THREADS: 2
      MICROBIN_QR: true
      MICROBIN_ETERNAL_PASTA: true
      MICROBIN_GC_DAYS: 365 # Auto delete after 1 year of no access
      MICROBIN_ADMIN_USERNAME: ${MICROBIN_ADMIN_USERNAME}
      MICROBIN_ADMIN_PASSWORD: ${MICROBIN_ADMIN_PASSWORD}
    labels:
      traefik.enable: true
      traefik.docker.network: core_microbin
      homepage.group: Services
      homepage.name: Microbin
      homepage.icon: microbin
      homepage.href: &url https://microbin.nicholaslyz.com
      homepage.siteMonitor: *url

volumes:
  microbin:

networks:
  microbin:
