http:
  middlewares:
    no-index:
      headers:
        customResponseHeaders:
          X-Robots-Tag: none
    security-headers:
      headers:
        # securityheaders.com
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        referrerPolicy: same-origin # fixes paperless CSRF issues
        customResponseHeaders:
          x-powered-by: ""
          x-frame-options: SAMEORIGIN # Fix for Reactive Resume
          server: ""
    compress:
      compress:
        encodings: zstd,br,gzip
        defaultEncoding: gzip
        includedContentTypes:
          - application/json
          - text/html
          - text/plain
          - text/css
          - application/javascript
    dashboard-auth:
      digestAuth:
        users:
          - '{{env "TRAEFIK_DIGEST_AUTH"}}'
  routers:
    dashboard:
      rule: Host(`traefik.internal.nicholaslyz.com`)
      entrypoints:
        - tailscale
      service: api@internal
      middlewares:
        - dashboard-auth@file

  # Only available via the file provider
  # https://github.com/traefik/traefik/issues/7893
  serversTransports:
    unifi:
      # Unifi controller uses a self-signed cert
      insecureSkipVerify: true
