services:
  browserless:
    container_name: browserless
    image: ghcr.io/browserless/chromium@sha256:05f10074ec39bc9161881c8ccc79304f98e713bb9c97dc0140e35fd3877374b7
    restart: always
    environment:
      TZ: Asia/Singapore
      TOKEN: ${BROWSERLESS_TOKEN}

      # The following are necessary for link previews to work
      CORS: true
    networks:
      - changedetection-io
      - karakeep
      - reactive-resume

      # External
      - polythought

networks:
  polythought:
    external: true
    name: polythought_polythought
