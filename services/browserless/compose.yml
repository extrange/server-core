services:
  browserless:
    container_name: browserless
    image: ghcr.io/browserless/chromium@sha256:664fc3a5df36c76489aa3b2c02d014c1f44d7c7875fe77f06c652c4759ac0201
    restart: always
    environment:
      TZ: Asia/Singapore
      TOKEN: ${BROWSERLESS_TOKEN}

      # The following are necessary for link previews to work
      CORS: true
    networks:
      - changedetection-io
      - karakeep
      - reactive-resume

      # External
      - polythought

networks:
  polythought:
    external: true
    name: polythought_polythought
