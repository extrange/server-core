services:
  browserless:
    container_name: browserless
    image: ghcr.io/browserless/chromium@sha256:1ea245ba4cd7082dcf5df9af60883e86588fa714ad2bdfde9717badf24b8ac2d
    restart: always
    environment:
      TZ: Asia/Singapore
      TOKEN: ${BROWSERLESS_TOKEN}

      # The following are necessary for link previews to work
      CORS: true
    networks:
      - changedetection-io
      - karakeep
      - reactive-resume

      # External
      - polythought

networks:
  polythought:
    external: true
    name: polythought_polythought
