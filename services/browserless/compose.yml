services:
  browserless:
    container_name: browserless
    image: ghcr.io/browserless/chromium@sha256:4b16f7457a429ef5cee56f407913400cccf2e34e88398507d7ead252a221a281
    restart: always
    environment:
      TZ: Asia/Singapore
      TOKEN: ${BROWSERLESS_TOKEN}

      # The following are necessary for link previews to work
      CORS: true
    networks:
      - changedetection-io
      - karakeep
      - reactive-resume

      # External
      - polythought

networks:
  polythought:
    external: true
    name: polythought_polythought
