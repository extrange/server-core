services:
  browserless:
    container_name: browserless
    image: ghcr.io/browserless/chromium@sha256:df26110c3233a74f8f88f5d198fe75e092d741197e0789516180b325a6a346b3
    restart: always
    environment:
      TZ: Asia/Singapore
      TOKEN: ${BROWSERLESS_TOKEN}

      # The following are necessary for link previews to work
      CORS: true
    networks:
      - changedetection-io
      - karakeep
      - reactive-resume

      # External
      - polythought

networks:
  polythought:
    external: true
    name: polythought_polythought
