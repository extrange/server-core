services:
  browserless:
    container_name: browserless
    image: ghcr.io/browserless/chromium@sha256:70616ef63d19bb0ca011ed99df562958495e17374f08f31a4851badcb4045806
    restart: always
    environment:
      TZ: Asia/Singapore
      TOKEN: ${BROWSERLESS_TOKEN}

      # The following are necessary for link previews to work
      CORS: true
    networks:
      - changedetection-io
      - karakeep
      - reactive-resume

      # External
      - polythought

networks:
  polythought:
    external: true
    name: polythought_polythought
