services:
  browserless:
    container_name: browserless
    image: ghcr.io/browserless/chromium@sha256:35deff208e30b3d8681f21f43f337e475e5bee21ad8b22d41359028e677210b6
    restart: always
    environment:
      TZ: Asia/Singapore
      TOKEN: ${BROWSERLESS_TOKEN}

      # The following are necessary for link previews to work
      CORS: true
    networks:
      - changedetection-io
      - karakeep
      - reactive-resume

      # External
      - polythought

networks:
  polythought:
    external: true
    name: polythought_polythought
