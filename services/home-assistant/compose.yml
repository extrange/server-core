services:
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant@sha256:f0baa7922ecec7790c40c41baf08ab218b6ab8db5f96dc03b03a0ae33d987c3d
    container_name: home-assistant
    restart: always
    depends_on:
      - mosquitto
    post_start:
      - command: udhcpc -i eth1 -x hostname:home-assistant # Get a DHCP address for itself
        user: root
    networks:
      home-assistant:
      home-assistant-macvlan:
        mac_address: 3a:bb:ab:31:7e:5c # Use a fixed MAC to prevent IP address exhaustion on container restarts
    volumes:
      - ./data/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    labels:
      traefik.enable: true
      traefik.docker.network: core_home-assistant
      traefik.http.services.home-assistant.loadbalancer.server.port: 8123
      homepage.group: Services
      homepage.name: Home Assistant
      homepage.icon: home-assistant
      homepage.href: &url https://home-assistant.nicholaslyz.com
      homepage.siteMonitor: *url
    cap_add:
      - net_admin # Allow HA to discover devices on the network

  music-assistant:
    image: ghcr.io/music-assistant/server@sha256:eef3ee7810d0e4702afa4a0ff55b10bbbfcaa16c98a277fe1b7f4cb6d5d426b4
    container_name: music-assistant
    restart: always
    networks:
      home-assistant:
      music-assistant-macvlan:
        mac_address: B2:13:B2:C2:30:53 # Use a fixed MAC to prevent IP address exhaustion on container restarts
    post_start:
      - command: /bin/bash -c 'apt-get update && apt-get install -y udhcpc && udhcpc -i eth1 -x hostname:music-assistant' # Get a DHCP address for itself
        user: root
    volumes:
      - ./data/music-assistant:/data/
    labels:
      traefik.enable: true
      traefik.docker.network: core_home-assistant
      homepage.group: Services
      homepage.name: Music Assistant
      homepage.icon: music-assistant
      homepage.href: &url https://music-assistant.nicholaslyz.com
      homepage.siteMonitor: *url
    cap_add:
      - net_admin # Allow HA to discover devices on the network/obtain DHCP address

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt@sha256:67c26dcf8346aced02fe1380a6afd1b57268bcef10faae3f6057c13d5d3dfa80
    restart: always
    user: 1000:1000
    networks:
      - zigbee2mqtt
    volumes:
      - ./data/zigbee2mqtt:/app/data
      - /etc/localtime:/etc/localtime:ro
    labels:
      traefik.enable: true
      traefik.docker.network: core_zigbee2mqtt
      traefik.http.routers.zigbee2mqtt.rule: Host(`zigbee2mqtt.internal.nicholaslyz.com`)
      traefik.http.routers.zigbee2mqtt.entrypoints: tailscale
      homepage.group: Services
      homepage.name: Zigbee2MQTT
      homepage.icon: zigbee2mqtt
      homepage.href: https://zigbee2mqtt.internal.nicholaslyz.com
      homepage.siteMonitor: http://zigbee2mqtt:8080

  mosquitto:
    image: eclipse-mosquitto@sha256:a908c65cc8e67ec9d292ef27c2c0360dbaaee7eb1b935cdd194e67697f15dea1
    container_name: mosquitto
    restart: always
    user: 1000:1000
    # We don't create a mosquitto network, as that would allow cross-communication between
    # containers that use mosquitto.
    networks:
      - zigbee2mqtt
      - home-assistant
      - frigate
    volumes:
      - ./data/mosquitto/config:/mosquitto/config
      - ./data/mosquitto/data:/mosquitto/data

networks:
  home-assistant:
  home-assistant-macvlan:
    # Required for device discovery
    # ipvlan does not support DHCP
    driver: macvlan
    driver_opts:
      parent: enp5s0
  music-assistant-macvlan:
    driver: macvlan
    driver_opts:
      parent: enp5s0

  zigbee2mqtt:
