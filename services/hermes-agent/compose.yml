services:
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest@sha256:f0f9e9a73d6aedde9eaf4010ab604c3e015494e494318b26f1011144856b8112
    container_name: hindsight
    restart: always
    environment:
      TZ: Asia/Singapore
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY}
      HINDSIGHT_API_LLM_PROVIDER: deepseek
      HINDSIGHT_API_LLM_MODEL: deepseek-v4-flash
      HINDSIGHT_API_WORKER_ID: hindsight
    volumes:
      - ./data/hindsight:/home/hindsight/.pg0
    networks:
      - hindsight
    labels:
      traefik.enable: true
      traefik.http.routers.hindsight.rule: Host(`hindsight.internal.nicholaslyz.com`)
      traefik.http.routers.hindsight.entrypoints: tailscale
      traefik.http.services.hindsight.loadbalancer.server.port: 9999
      traefik.docker.network: core_hindsight
      homepage.group: Services
      homepage.name: Hindsight
      homepage.icon: hindsight
      homepage.href: &url https://hindsight.internal.nicholaslyz.com
      homepage.siteMonitor: *url

  hermes-agent-gdfm:
    build: # Hack for https://github.com/NousResearch/hermes-agent/issues/14980
      dockerfile: Containerfile
    container_name: hermes-agent-gdfm
    restart: always
    command: gateway run
    depends_on:
      - hindsight
    networks:
      - hermes-agent-gdfm
      - hindsight
    volumes:
      - ./data/gdfm:/opt/data
      - /mnt/storage/Notes/GDFM:/opt/data/GDFM
    environment:
      HERMES_DASHBOARD: 1
      HERMES_UID: 1000
      HERMES_GID: 1000
      API_SERVER_ENABLED: true
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_MODEL_NAME: Hermes Agent (GDFM)
      OBSIDIAN_VAULT_PATH: /opt/data/GDFM
    labels:
      traefik.enable: true
      traefik.http.routers.hermes-agent-gdfm.rule: Host(`hermes-agent-gdfm.internal.nicholaslyz.com`)
      traefik.http.routers.hermes-agent-gdfm.entrypoints: tailscale
      traefik.http.services.hermes-agent-gdfm.loadbalancer.server.port: 9119
      traefik.docker.network: core_hermes-agent-gdfm
      homepage.group: Services
      homepage.name: Hermes Agent (GDFM)
      homepage.icon: hermes-agent
      homepage.href: &url https://hermes-agent-gdfm.internal.nicholaslyz.com
      homepage.siteMonitor: *url

  hermes-agent-xiaoyun:
    build: # Hack for https://github.com/NousResearch/hermes-agent/issues/14980
      dockerfile: Containerfile
    container_name: hermes-agent-xiaoyun
    restart: always
    command: gateway run
    depends_on:
      - hindsight
    networks:
      - hermes-agent-xiaoyun
      - hindsight
    volumes:
      - ./data/xiaoyun:/opt/data
    environment:
      HERMES_DASHBOARD: 1
      HERMES_UID: 1000
      HERMES_GID: 1000
    labels:
      traefik.enable: true
      traefik.http.routers.hermes-agent-xiaoyun.rule: Host(`hermes-agent-xiaoyun.internal.nicholaslyz.com`)
      traefik.http.routers.hermes-agent-xiaoyun.entrypoints: tailscale
      traefik.http.services.hermes-agent-xiaoyun.loadbalancer.server.port: 9119
      traefik.docker.network: core_hermes-agent-xiaoyun
      homepage.group: Services
      homepage.name: Hermes Agent (Xiao Yun)
      homepage.icon: hermesagent
      homepage.href: &url https://hermes-agent-xiaoyun.internal.nicholaslyz.com
      homepage.siteMonitor: *url

networks:
  hindsight:
  hermes-agent-xiaoyun:
  hermes-agent-gdfm:
