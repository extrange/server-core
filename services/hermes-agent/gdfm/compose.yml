services:
  hermes-agent-gdfm:
    build: # Hack for https://github.com/NousResearch/hermes-agent/issues/14980
      dockerfile: ../Containerfile
    container_name: hermes-agent-gdfm
    restart: always
    command: gateway run
    networks:
      - hermes-agent-gdfm
    volumes:
      - ./data:/opt/data
      - /mnt/storage/Notes/GDFM:/opt/data/GDFM
    environment:
      HERMES_DASHBOARD: 1
      HERMES_UID: 1000
      HERMES_GID: 1000
      API_SERVER_ENABLED: true
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_MODEL_NAME: Hermes Agent (GDFM)
      OBSIDIAN_VAULT_PATH: /opt/data/GDFM
    labels:
      traefik.enable: true
      traefik.http.routers.hermes-agent-gdfm.rule: Host(`hermes-agent-gdfm.internal.nicholaslyz.com`)
      traefik.http.routers.hermes-agent-gdfm.entrypoints: tailscale
      traefik.http.services.hermes-agent-gdfm.loadbalancer.server.port: 9119
      traefik.docker.network: core_hermes-agent-gdfm
      homepage.group: Services
      homepage.name: Hermes Agent (GDFM)
      homepage.icon: hermes-agent
      homepage.href: https://hermes-agent-gdfm.internal.nicholaslyz.com
      homepage.siteMonitor: http://hermes-agent-gdfm:9119

networks:
  hermes-agent-gdfm:
