services:
  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent@sha256:dd24a5f3db32bc1425d3f8dc95e8aca8ac5a35905d798171230edf33f516d9a4
    restart: always
    volumes:
      - ./data:/config/qBittorrent:rw
      - /mnt/storage/Downloads:/config/Downloads:rw
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Singapore
      DOCKER_MODS: ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    networks:
      - qbittorrent
    labels:
      traefik.http.routers.qbittorrent.rule: Host(`qbittorrent.internal.nicholaslyz.com`)
      traefik.http.routers.qbittorrent.entrypoints: tailscale
      traefik.http.services.qbittorrent.loadbalancer.server.port: 8080
      traefik.docker.network: core_qbittorrent
      traefik.enable: true
      homepage.group: Services
      homepage.name: qBittorrent
      homepage.icon: qbittorrent
      homepage.href: &url https://qbittorrent.internal.nicholaslyz.com
      homepage.siteMonitor: *url
      homepage.widget.type: qbittorrent
      homepage.widget.url: *url

networks:
  qbittorrent:
