services:
  paperless-redis:
    image: docker.io/library/redis:8@sha256:0c341492924cad6f5483f9133e43bd6c51ecdecbcadfac5b51657393b6a7936c
    restart: always
    volumes:
      - paperless-redis:/data
    networks:
      - paperless
  paperless-db:
    image: docker.io/library/postgres:18@sha256:f7ce845ee6873dd84be93c9828fe0d1fab0f9707dc9ac569694657398b290bce
    restart: always
    volumes:
      - ./data/postgresql:/var/lib/postgresql
    networks:
      - paperless
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
    restart: always
    depends_on:
      - paperless-redis
      - paperless-db
      - paperless-gotenberg
      - paperless-tika
    networks:
      - paperless
    volumes:
      - ./data/paperless:/usr/src/paperless/data
      - /mnt/storage/Documents:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - /mnt/storage/Incoming Scans:/usr/src/paperless/consume
    environment:
      DEBUG: true
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD}
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
      PAPERLESS_URL: https://paperless.nicholaslyz.com
    labels:
      traefik.enable: true
      traefik.docker.network: core_paperless
      homepage.group: Services
      homepage.name: Paperless
      homepage.icon: paperless-ngx
      homepage.href: &url https://paperless.nicholaslyz.com
      homepage.siteMonitor: *url
  paperless-gotenberg:
    image: docker.io/gotenberg/gotenberg:8.32@sha256:a40c5a46b79d812ce2f5e139278163142a054050bfd1e5f162da36d3d11c7138
    restart: always
    # The gotenberg chromium route is used to convert .eml files. We do not want to allow external content like tracking pixels or even javascript.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      - paperless
  paperless-tika:
    image: docker.io/apache/tika:latest@sha256:2a565f1ea1290bdcb74a7d35957d16a989ed44ef98790dcdcc28121d728fa583
    restart: always
    networks:
      - paperless

volumes:
  paperless-redis:

networks:
  paperless:
